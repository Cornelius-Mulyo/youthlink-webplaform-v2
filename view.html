<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View {{ filename }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-5">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="mb-0">View: {{ filename }}</h3>
    <div class="d-flex gap-2">
      <a class="btn btn-primary" href="{{ url_for('download', filename=filename) }}">Download</a>
      <a class="btn btn-secondary" href="{{ url_for('home') }}">Back</a>
    </div>
  </div>

  {% if kind == "text" %}
    <pre class="bg-white border rounded p-3" style="white-space: pre-wrap;">{{ content }}</pre>

  {% elif kind == "inline" %}
    {% if ext in [".png",".jpg",".jpeg",".gif",".webp",".svg"] %}
      <div class="bg-white border rounded p-3 text-center">
        <img src="{{ url_for('raw_file', filename=filename) }}" class="img-fluid" alt="{{ filename }}">
      </div>

    {% elif ext == ".pdf" %}
      <object data="{{ url_for('raw_file', filename=filename) }}" type="application/pdf" width="100%" height="800">
        <p class="text-muted">
          PDF preview not available.
          <a href="{{ url_for('raw_file', filename=filename) }}" target="_blank">Open in a new tab</a>
          or <a href="{{ url_for('download', filename=filename) }}">download</a>.
        </p>
      </object>

    {% else %}
      <div class="alert alert-warning">Preview not available for this file type.</div>
    {% endif %}
  {% endif %}

</div>
</body>
</html>
